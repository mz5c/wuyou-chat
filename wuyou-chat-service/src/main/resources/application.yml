server:
  port: 8080

spring:
  application:
    name: wuyou-chat
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/wuyou_chat?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: ${DB_PASSWORD}
  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD}
    database: 0
  thymeleaf:
    cache: false

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.wuyou.chat.service.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# AI 配置
ai:
  provider:
    api-url: https://openapi.ai-da.cn/v1/chat/completions
    api-key: ${AI_API_KEY}
    model: qwen3.5-122b

# JWT 配置
jwt:
  secret: ${JWT_SECRET}
  expiration: 172800000  # 2 天（毫秒）

# 日志配置
logging:
  level:
    com.wuyou.chat.service: DEBUG
    org.springframework.security: DEBUG

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
