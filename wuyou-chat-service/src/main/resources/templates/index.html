<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友聊 AI 问答</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
        }
        .header h1 {
            font-size: 16px;
            font-weight: 700;
            color: #111827;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-info span {
            font-size: 13px;
            color: #6b7280;
        }
        .logout-btn {
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            color: #6b7280;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s, color 0.2s;
        }
        .logout-btn:hover {
            background: #fee2e2;
            color: #dc2626;
            border-color: #fecaca;
        }
        .model-select-thymeleaf {
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #e5e7eb;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }
        .model-select-thymeleaf option {
            color: #374151;
            background: #ffffff;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }
        .message.user { align-items: flex-end; }
        .message.ai { align-items: flex-start; }
        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.6;
            font-size: 14px;
        }
        .message.user .message-bubble {
            background: #2563eb;
            color: white;
            border-radius: 12px 12px 4px 12px;
        }
        .message.ai .message-bubble {
            background: #ffffff;
            color: #374151;
            border: 1px solid #e5e7eb;
            border-radius: 12px 12px 12px 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }
        .message-bubble p { margin: 0 0 8px 0; }
        .message-bubble p:last-child { margin-bottom: 0; }
        .message-bubble ul, .message-bubble ol { margin: 4px 0; padding-left: 20px; }
        .message-bubble code {
            background: rgba(0,0,0,0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .message.user .message-bubble code { background: rgba(255,255,255,0.2); }
        .message-bubble pre {
            background: rgba(0,0,0,0.08);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .message-bubble pre code { background: none; padding: 0; }
        .message-bubble blockquote {
            border-left: 3px solid #d1d5db;
            margin: 8px 0;
            padding-left: 12px;
            color: #6b7280;
        }
        .message-bubble table { border-collapse: collapse; margin: 8px 0; }
        .message-bubble th, .message-bubble td {
            border: 1px solid #e5e7eb;
            padding: 6px 10px;
        }
        .message-time {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 4px;
        }
        .reasoning-toggle { margin-top: 8px; font-size: 13px; }
        .reasoning-toggle summary {
            cursor: pointer;
            color: #9ca3af;
            user-select: none;
            padding: 4px 0;
        }
        .reasoning-toggle summary:hover { color: #2563eb; }
        .reasoning-content {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
            font-size: 13px;
            color: #6b7280;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .input-container {
            display: flex;
            padding: 16px 24px;
            background: #ffffff;
            border-top: 1px solid #e5e7eb;
            gap: 8px;
        }
        .input-container input {
            flex: 1;
            height: 40px;
            padding: 0 16px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-container input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37,99,235,0.1);
        }
        .input-container button {
            background: #2563eb;
            color: white;
            border: none;
            height: 40px;
            padding: 0 20px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .input-container button:hover { background: #1d4ed8; }
        .input-container button:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }
        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }
        .empty-state svg {
            width: 64px;
            height: 64px;
            opacity: 0.3;
            margin-bottom: 16px;
        }
        .message-bubble .katex { font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>友聊 AI 问答</h1>
            <div class="user-info" id="userInfo" style="display: none;">
                <span id="username"></span>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>
            <select id="modelSelect" class="model-select-thymeleaf">
                <option value="">加载中...</option>
            </select>
        </div>
        <div class="chat-container" id="chatContainer">
            <div class="empty-state" id="emptyState">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
                <p>开始对话吧！</p>
            </div>
        </div>
        <div class="input-container">
            <input type="text" id="questionInput" placeholder="输入您的问题..." onkeypress="handleKeyPress(event)" disabled>
            <button id="sendBtn" onclick="sendMessage()" disabled>发送</button>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let token = getCookie('token');
        let userInfo = JSON.parse(localStorage.getItem('userInfo') || 'null');
        let conversationId = localStorage.getItem('conversationId');
        let currentModelId = null;

        // Initialize
        if (!token) {
            // Redirect to login page if not logged in
            window.location.href = '/login';
        } else if (userInfo) {
            showChatInterface();
        } else {
            // Token exists but userInfo missing (e.g., after login), fetch from API
            fetchUserInfo();
        }

        async function fetchUserInfo() {
            try {
                const response = await fetch(`${API_BASE}/user/info`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();
                if (result.code === 200) {
                    userInfo = result.data;
                    localStorage.setItem('userInfo', JSON.stringify(userInfo));
                    showChatInterface();
                } else {
                    window.location.href = '/login';
                }
            } catch (e) {
                console.error('获取用户信息失败', e);
                window.location.href = '/login';
            }
        }

        async function loadModels() {
            try {
                const res = await fetch(`${API_BASE}/models/enabled`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();
                if (result.code === 200 && result.data.length > 0) {
                    const select = document.getElementById('modelSelect');
                    select.innerHTML = '';
                    result.data.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m.id;
                        opt.textContent = m.name;
                        select.appendChild(opt);
                    });
                    currentModelId = result.data[0].id;
                    select.onchange = () => { currentModelId = Number(select.value); };
                }
            } catch (e) {
                console.error('加载模型列表失败', e);
            }
        }

        function getCookie(name) {
            const nameEQ = name + '=';
            const ca = document.cookie.split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) === ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) === 0) {
                    return decodeURIComponent(c.substring(nameEQ.length, c.length));
                }
            }
            return null;
        }

        function showChatInterface() {
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('username').textContent = userInfo.nickname || userInfo.username;
            document.getElementById('questionInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            loadModels();
            loadHistory();
        }

        function setCookie(name, value, days) {
            const expires = new Date();
            expires.setTime(expires.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = name + '=' + encodeURIComponent(value) + ';expires=' + expires.toUTCString() + ';path=/';
        }

        function logout() {
            token = null;
            userInfo = null;
            conversationId = null;
            document.cookie = 'token=;path=/;expires=Thu, 01 Jan 1970 00:00:00 GMT';
            localStorage.removeItem('userInfo');
            localStorage.removeItem('conversationId');
            window.location.href = '/login';
        }

        // 配置 marked
        marked.setOptions({
            breaks: true,       // 支持普通换行
            gfm: true           // GitHub 风格 Markdown
        });

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function renderMarkdown(text) {
            if (!text) return '';
            // 使用 marked 渲染 markdown，返回 HTML
            return marked.parse(text);
        }

        function renderMath(element) {
            if (typeof renderMathInElement === 'function') {
                try {
                    renderMathInElement(element, {
                        delimiters: [
                            { left: '$$', right: '$$', display: true },
                            { left: '$', right: '$', display: false },
                            { left: '\\[', right: '\\]', display: true },
                            { left: '\\(', right: '\\)', display: false }
                        ],
                        throwOnError: false
                    });
                } catch (e) {
                    console.warn('KaTeX 渲染失败', e);
                }
            }
        }

        function addMessage(content, isUser, reasoningContent) {
            const emptyState = document.getElementById('emptyState');
            if (emptyState) {
                emptyState.style.display = 'none';
            }
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            let html = '';
            if (!isUser && reasoningContent) {
                html += `<details class="reasoning-toggle"><summary>💭 思考过程</summary>
                    <div class="reasoning-content">${escapeHtml(reasoningContent)}</div>
                </details>`;
            }

            html += `<div class="message-bubble">${renderMarkdown(content)}</div>
                <div class="message-time">${time}</div>`;

            messageDiv.innerHTML = html;
            chatContainer.appendChild(messageDiv);

            // 渲染 KaTeX 数学公式
            const bubble = messageDiv.querySelector('.message-bubble');
            if (bubble) {
                renderMath(bubble);
            }

            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            if (!question) return;

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span>';

            addMessage(question, true);
            input.value = '';

            try {
                const requestBody = { question };
                if (conversationId) {
                    requestBody.conversationId = conversationId;
                }
                if (currentModelId) {
                    requestBody.modelId = currentModelId;
                }

                const response = await fetch(`${API_BASE}/chat/ask`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(requestBody)
                });
                const result = await response.json();

                if (result.code === 200) {
                    conversationId = result.data.conversationId;
                    localStorage.setItem('conversationId', conversationId);
                    addMessage(result.data.answer, false, result.data.reasoningContent);
                } else {
                    addMessage(`错误：${result.message}`, false);
                }
            } catch (e) {
                addMessage('网络错误，请稍后重试', false);
            } finally {
                sendBtn.textContent = '发送';
                sendBtn.disabled = false;
            }
        }

        async function loadHistory() {
            try {
                const response = await fetch(`${API_BASE}/chat/history?page=1&size=20`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();

                if (result.code === 200 && result.data.length > 0) {
                    document.getElementById('emptyState').style.display = 'none';
                    const chatContainer = document.getElementById('chatContainer');
                    chatContainer.innerHTML = '';

                    // 反转数组使最新记录显示在底部
                    result.data.reverse().forEach(record => {
                        const messageDiv = document.createElement('div');
                        messageDiv.className = 'message user';
                        const time = new Date(record.createdAt).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                        messageDiv.innerHTML = `
                            <div class="message-bubble">${renderMarkdown(record.question)}</div>
                            <div class="message-time">${time}</div>
                        `;
                        chatContainer.appendChild(messageDiv);
                        // 渲染用户消息中的 LaTeX
                        renderMath(messageDiv.querySelector('.message-bubble'));

                        const aiMessageDiv = document.createElement('div');
                        aiMessageDiv.className = 'message ai';
                        let aiHtml = '';
                        if (record.reasoningContent) {
                            aiHtml += `<details class="reasoning-toggle"><summary>💭 思考过程</summary>
                                <div class="reasoning-content">${escapeHtml(record.reasoningContent)}</div>
                            </details>`;
                        }
                        aiHtml += `<div class="message-bubble">${renderMarkdown(record.answer)}</div>
                            <div class="message-time">${time}</div>`;
                        aiMessageDiv.innerHTML = aiHtml;
                        chatContainer.appendChild(aiMessageDiv);
                        // 渲染 AI 回答中的 LaTeX
                        renderMath(aiMessageDiv.querySelector('.message-bubble'));
                    });
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
            } catch (e) {
                console.error('加载历史记录失败', e);
            }
        }
    </script>
</body>
</html>
